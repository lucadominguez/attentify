name = "attentify-cloud"
main = "src/index.js"
compatibility_date = "2024-11-01"
workers_dev = true

# Serve the API (and the GET /download/win installer route) on a custom domain.
# Requires attentify.ai to be a zone in this Cloudflare account; on `wrangler deploy`
# Wrangler provisions the DNS record + edge cert for api.attentify.ai automatically.
# DISABLED until attentify.ai is registered + added to Cloudflare — the domain does not
# resolve yet, so this route fails `wrangler deploy`. Consumers use the workers.dev URL.
# To re-enable the attentify.ai rebrand: register the domain, add the zone, then uncomment.
# [[routes]]
# pattern = "api.attentify.ai"
# custom_domain = true

# Non-secret config (override per-environment as needed)
[vars]
# Live site for Stripe success/cancel redirects. Points at the current Pages deployment
# until the attentify.ca cutover (D1); do NOT set to attentify.ca before that zone is live.
SITE_URL = "https://productivity-daemon.pages.dev"
STRIPE_PRICE_ID = "price_1Te4T74HbvDyQQl1XKQBhM7Q"   # $9.99/mo subscription — REPLACE via setup-stripe.mjs output
# One-time credit-pack prices (created by setup-stripe.mjs). Empty until provisioned;
# the /v1/billing/credits route returns 503 until these are set.
STRIPE_PRICE_CREDITS_5 = ""
STRIPE_PRICE_CREDITS_10 = ""
STRIPE_PRICE_CREDITS_20 = ""

# D1 database binding. Create it once with:
#   wrangler d1 create pd-cloud
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "pd-cloud"
database_id = "a1272762-59ef-462c-80ce-3382e5adff91"

# R2 bucket holding the public installer download (served via GET /download/win).
# Create it once with:  wrangler r2 bucket create pd-downloads
[[r2_buckets]]
binding = "DOWNLOADS"
bucket_name = "pd-downloads"

# Secrets are NOT stored here. Set them with `wrangler secret put <NAME>`:
#   OPENROUTER_KEY_APP     provider key for the desktop app's AI (spend attribution)
#   OPENROUTER_KEY_EXT     provider key for the extension's AI (spend attribution)
#   OPENROUTER_KEY         legacy single-key fallback (optional once the two above are set)
#   STRIPE_SECRET          rk_live_... / rk_test_... (restricted key preferred)
#   STRIPE_WEBHOOK_SECRET  whsec_... (from the webhook endpoint you create)
#   TURNSTILE_SECRET       Cloudflare Turnstile secret (anti-abuse on signup; unset = skip)
#   ADMIN_TOKEN            long random string guarding /v1/admin/*
